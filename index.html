<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-slate-100">

    <div class="flex flex-col items-center justify-center min-h-screen bg-slate-100 p-4">
        
        <h1 class="text-4xl font-black text-slate-800 mb-6 uppercase tracking-widest">Sudoku</h1>
        <div id="stats" class="flex gap-8 mb-4 text-lg font-medium">
            <p>Mistakes: <span id="errors">0</span>/3</p> <!-- count mistakes made by user -->
        </div>
        
        <div id="board" class="grid grid-cols-9 w-[450px] h-[450px] bg-white border-4 border-slate-900 shadow-2xl"></div> <!-- Game board -->
        
        <div id="digits" class="flex gap-2 mt-6"> <!-- Displaying numbers so the user can choose to put in board-->

            <div id="1" class="number w-12 h-12 flex items-center justify-center bg-white border-2 border-slate-200 rounded-lg cursor-pointer hover:bg-blue-600 hover:text-white transition-all font-bold shadow-sm">1</div>
            <div id="2" class="number w-12 h-12 flex items-center justify-center bg-white border-2 border-slate-200 rounded-lg cursor-pointer hover:bg-blue-600 hover:text-white transition-all font-bold shadow-sm">2</div>
            <div id="3" class="number w-12 h-12 flex items-center justify-center bg-white border-2 border-slate-200 rounded-lg cursor-pointer hover:bg-blue-600 hover:text-white transition-all font-bold shadow-sm">3</div>
            <div id="4" class="number w-12 h-12 flex items-center justify-center bg-white border-2 border-slate-200 rounded-lg cursor-pointer hover:bg-blue-600 hover:text-white transition-all font-bold shadow-sm">4</div>
            <div id="5" class="number w-12 h-12 flex items-center justify-center bg-white border-2 border-slate-200 rounded-lg cursor-pointer hover:bg-blue-600 hover:text-white transition-all font-bold shadow-sm">5</div>
            <div id="6" class="number w-12 h-12 flex items-center justify-center bg-white border-2 border-slate-200 rounded-lg cursor-pointer hover:bg-blue-600 hover:text-white transition-all font-bold shadow-sm">6</div>
            <div id="7" class="number w-12 h-12 flex items-center justify-center bg-white border-2 border-slate-200 rounded-lg cursor-pointer hover:bg-blue-600 hover:text-white transition-all font-bold shadow-sm">7</div>
            <div id="8" class="number w-12 h-12 flex items-center justify-center bg-white border-2 border-slate-200 rounded-lg cursor-pointer hover:bg-blue-600 hover:text-white transition-all font-bold shadow-sm">8</div>
            <div id="9" class="number w-12 h-12 flex items-center justify-center bg-white border-2 border-slate-200 rounded-lg cursor-pointer hover:bg-blue-600 hover:text-white transition-all font-bold shadow-sm">9</div>
        </div>

        <button id="reset-btn" class="mt-8 px-10 py-3 bg-slate-900 text-white rounded-full font-bold active:scale-95 transition-transform">Replay</button> <!-- Button to restart the game -->
    </div>
<script src="script.js"></script>
</body>
</html>
